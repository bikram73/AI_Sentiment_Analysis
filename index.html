<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Sentiment Analyzer</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap");

      :root {
        --bg-1: #f5f7ff;
        --bg-2: #e8fff8;
        --panel: #ffffff;
        --text: #102a43;
        --muted: #5a6f8c;
        --accent: #0f766e;
        --shadow: 0 18px 45px rgba(16, 42, 67, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Space Grotesk", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 20%, #dbeafe 0%, transparent 40%),
          radial-gradient(circle at 90% 10%, #fef3c7 0%, transparent 35%),
          linear-gradient(135deg, var(--bg-1), var(--bg-2));
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1000px;
        margin: 0 auto;
        display: grid;
        gap: 16px;
      }

      .hero,
      .panel {
        background: var(--panel);
        border-radius: 20px;
        box-shadow: var(--shadow);
        border: 1px solid #dde7f2;
      }

      .hero {
        padding: 24px;
        background: linear-gradient(135deg, #052e2b, #0f766e 60%, #14b8a6);
        color: #fff;
      }

      .hero h1 {
        margin: 0;
      }

      .hero p {
        margin: 10px 0 0;
        color: #d1fae5;
      }

      .panel {
        padding: 20px;
      }

      textarea,
      select,
      button {
        width: 100%;
        border-radius: 12px;
        border: 1px solid #c8d5e5;
        font-size: 16px;
        font-family: inherit;
      }

      textarea,
      select {
        padding: 12px;
        background: #fff;
      }

      textarea {
        min-height: 130px;
        resize: vertical;
      }

      button {
        padding: 12px;
        background: linear-gradient(135deg, #0ea5e9, #0f766e);
        color: #fff;
        border: none;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .grid {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 16px;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 12px;
      }

      .actions button:last-child {
        background: #334155;
      }

      .result-title {
        color: var(--muted);
        font-size: 14px;
        margin: 0;
      }

      .result-value {
        margin: 6px 0 12px;
        font-size: 28px;
        font-weight: 700;
      }

      .meter {
        height: 10px;
        width: 100%;
        border-radius: 999px;
        background: #e2e8f0;
        overflow: hidden;
      }

      .meter > span {
        display: block;
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, #0ea5e9, #0f766e);
        transition: width 250ms ease;
      }

      .muted {
        margin-top: 10px;
        color: var(--muted);
      }

      @media (max-width: 860px) {
        .grid {
          grid-template-columns: 1fr;
        }

        body {
          padding: 14px;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="hero">
        <h1>AI Sentiment Analyzer</h1>
        <p>Vercel-ready sentiment app powered by Hugging Face Inference API.</p>
      </section>

      <section class="grid">
        <div class="panel">
          <label for="example"><strong>Examples</strong></label>
          <select id="example">
            <option value="">Choose an example (down arrow)</option>
          </select>

          <label for="text" style="display:block; margin-top:12px;"><strong>Input Text</strong></label>
          <textarea id="text" placeholder="Type your review, feedback, or message here..."></textarea>

          <div class="actions">
            <button id="analyzeBtn">Analyze Sentiment</button>
            <button id="clearBtn" type="button">Clear</button>
          </div>
        </div>

        <aside class="panel">
          <p class="result-title">Predicted Sentiment</p>
          <p class="result-value" id="sentiment">Waiting...</p>

          <p class="result-title">Confidence</p>
          <p id="confidence">0.00%</p>

          <div class="meter"><span id="meter"></span></div>
          <p class="muted" id="status">Enter text and click Analyze Sentiment.</p>
        </aside>
      </section>
    </main>

    <script>
      const EXAMPLES = [
        "I love this product. It works really well and exceeded my expectations.",
        "The service was okay. Nothing special, but not terrible either.",
        "This is the worst experience I have had. I want a refund immediately.",
        "Support responded quickly and solved my issue in minutes.",
        "Not bad, not great, just average overall.",
        "Absolutely fantastic experience from start to finish."
      ];

      const exampleSelect = document.getElementById("example");
      const textInput = document.getElementById("text");
      const analyzeBtn = document.getElementById("analyzeBtn");
      const clearBtn = document.getElementById("clearBtn");
      const sentimentEl = document.getElementById("sentiment");
      const confidenceEl = document.getElementById("confidence");
      const meterEl = document.getElementById("meter");
      const statusEl = document.getElementById("status");

      EXAMPLES.forEach((text, idx) => {
        const option = document.createElement("option");
        option.value = text;
        option.textContent = `${idx + 1}. ${text}`;
        exampleSelect.appendChild(option);
      });

      exampleSelect.addEventListener("change", () => {
        if (exampleSelect.value) {
          textInput.value = exampleSelect.value;
        }
      });

      clearBtn.addEventListener("click", () => {
        textInput.value = "";
        exampleSelect.value = "";
        sentimentEl.textContent = "Waiting...";
        confidenceEl.textContent = "0.00%";
        meterEl.style.width = "0%";
        statusEl.textContent = "Enter text and click Analyze Sentiment.";
      });

      analyzeBtn.addEventListener("click", async () => {
        const text = textInput.value.trim();

        if (!text) {
          statusEl.textContent = "Please enter text first.";
          return;
        }

        analyzeBtn.disabled = true;
        analyzeBtn.textContent = "Analyzing...";
        statusEl.textContent = "Contacting model...";

        try {
          const response = await fetch("/api/sentiment", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ text })
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || "Request failed");
          }

          const emojiMap = {
            Positive: "😊",
            Negative: "😡",
            Neutral: "😐"
          };

          sentimentEl.textContent = `${emojiMap[data.sentiment] || "🙂"} ${data.sentiment}`;
          confidenceEl.textContent = `${Number(data.confidence).toFixed(2)}%`;
          meterEl.style.width = `${Math.max(0, Math.min(100, Number(data.confidence)))}%`;
          statusEl.textContent = `Model: ${data.model}`;
        } catch (error) {
          statusEl.textContent = error.message;
        } finally {
          analyzeBtn.disabled = false;
          analyzeBtn.textContent = "Analyze Sentiment";
        }
      });
    </script>
  </body>
</html>
